<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мессенджер | Регистрация и группы</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0e1621;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Модальное окно входа/регистрации */
.auth-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.auth-container {
    background: #17212b;
    padding: 30px;
    border-radius: 16px;
    width: 340px;
}

.auth-container h2 {
    color: #fff;
    margin-bottom: 20px;
    text-align: center;
}

.auth-container input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    background: #1f2a36;
    border: 1px solid #2b3b4a;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    outline: none;
}

.auth-container button {
    width: 100%;
    padding: 12px;
    background: #2b5278;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 10px;
}

.auth-container button:hover {
    background: #3e6a8c;
}

.auth-switch {
    text-align: center;
    color: #8e9eae;
    cursor: pointer;
    margin-top: 10px;
    font-size: 14px;
}

.auth-switch:hover {
    color: #65b9f2;
}

.error-msg {
    color: #ff6b6b;
    font-size: 12px;
    margin-bottom: 10px;
    text-align: center;
}

.hidden {
    display: none;
}

/* Основной чат */
.app {
    width: 95%;
    max-width: 1400px;
    height: 90vh;
    background: #17212b;
    border-radius: 12px;
    display: flex;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* Левая панель */
.sidebar {
    width: 280px;
    background: #1f2a36;
    border-right: 1px solid #2b3b4a;
    display: flex;
    flex-direction: column;
}

.user-info {
    padding: 20px;
    background: #2b3b4a;
    border-bottom: 1px solid #3e5a6c;
}

.user-info h3 {
    color: #fff;
    font-size: 16px;
}

.user-info p {
    color: #8e9eae;
    font-size: 12px;
    margin-top: 5px;
}

.groups-section {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.groups-section h4 {
    color: #8e9eae;
    font-size: 12px;
    text-transform: uppercase;
    margin-bottom: 12px;
}

.group-item {
    padding: 10px 12px;
    margin-bottom: 5px;
    background: #2b3b4a;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.group-item:hover {
    background: #3e5a6c;
}

.group-item.active {
    background: #2b5278;
    border-left: 3px solid #65b9f2;
}

.group-name {
    color: #fff;
    font-size: 14px;
}

.group-members {
    color: #8e9eae;
    font-size: 11px;
}

.delete-group {
    background: none;
    border: none;
    color: #ff6b6b;
    cursor: pointer;
    font-size: 16px;
    padding: 0 5px;
    display: none;
}

.group-item:hover .delete-group {
    display: block;
}

.create-group {
    margin: 10px;
    padding: 10px;
    background: #2b5278;
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    width: calc(100% - 20px);
}

.create-group:hover {
    background: #3e6a8c;
}

.online-users {
    padding: 15px;
    border-top: 1px solid #2b3b4a;
}

.online-users h4 {
    color: #8e9eae;
    font-size: 12px;
    margin-bottom: 10px;
}

#onlineList {
    list-style: none;
    max-height: 150px;
    overflow-y: auto;
}

#onlineList li {
    color: #8e9eae;
    font-size: 13px;
    padding: 5px 0;
    display: flex;
    align-items: center;
    gap: 8px;
}

#onlineList li::before {
    content: "●";
    color: #4caf50;
    font-size: 10px;
}

/* Центральный чат */
.chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 15px 20px;
    background: #1f2a36;
    border-bottom: 1px solid #2b3b4a;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-header h2 {
    color: #fff;
    font-size: 18px;
}

.messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.message {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 14px;
    word-wrap: break-word;
}

.message.self {
    background: #2b5278;
    color: #fff;
    align-self: flex-end;
}

.message.other {
    background: #1f2a36;
    color: #fff;
    align-self: flex-start;
}

.message.system {
    background: #2b3b4a;
    color: #8e9eae;
    align-self: center;
    font-size: 12px;
    font-style: italic;
    max-width: 90%;
}

.message-header {
    font-size: 11px;
    color: #8e9eae;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
}

.input-area {
    padding: 15px 20px;
    background: #1f2a36;
    border-top: 1px solid #2b3b4a;
    display: flex;
    gap: 10px;
}

.input-area input {
    flex: 1;
    padding: 12px;
    background: #2b3b4a;
    border: none;
    border-radius: 20px;
    color: #fff;
    font-size: 14px;
    outline: none;
}

.input-area button {
    padding: 12px 24px;
    background: #2b5278;
    border: none;
    border-radius: 20px;
    color: #fff;
    cursor: pointer;
}
</style>
</head>
<body>

<!-- Модальное окно входа/регистрации -->
<div id="authModal" class="auth-modal">
    <div class="auth-container">
        <h2 id="authTitle">Вход</h2>
        <div id="authError" class="error-msg"></div>
        <input type="text" id="authUsername" placeholder="Юзернейм (например: john)">
        <input type="password" id="authPassword" placeholder="Пароль">
        <input type="text" id="authDisplayName" placeholder="Отображаемое имя (необязательно)" style="display: none;">
        <button id="authSubmitBtn">Войти</button>
        <div id="authSwitch" class="auth-switch">Нет аккаунта? Зарегистрироваться</div>
    </div>
</div>

<!-- Основной чат -->
<div id="app" class="app hidden">
    <div class="sidebar">
        <div class="user-info">
            <h3 id="currentUserName">Загрузка...</h3>
            <p id="currentUserDisplay"></p>
        </div>
        <div class="groups-section">
            <h4>📁 ГРУППЫ</h4>
            <div id="groupsList"></div>
            <button class="create-group" onclick="showCreateGroupModal()">+ Создать группу</button>
        </div>
        <div class="online-users">
            <h4>🟢 ОНЛАЙН</h4>
            <ul id="onlineList"></ul>
        </div>
    </div>
    
    <div class="chat-panel">
        <div class="chat-header">
            <h2 id="currentRoomName">Выберите группу</h2>
        </div>
        <div id="messagesContainer" class="messages">
            <div style="color:#8e9eae; text-align:center; padding:20px;">Выберите группу слева</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>Отправить</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentUser = null;
let currentRoomId = null;
let groups = {};

// ============ АУТЕНТИФИКАЦИЯ ============
let isLoginMode = true;

document.getElementById('authSwitch').onclick = () => {
    isLoginMode = !isLoginMode;
    const title = document.getElementById('authTitle');
    const submitBtn = document.getElementById('authSubmitBtn');
    const displayNameField = document.getElementById('authDisplayName');
    
    if (isLoginMode) {
        title.textContent = 'Вход';
        submitBtn.textContent = 'Войти';
        displayNameField.style.display = 'none';
        document.getElementById('authSwitch').textContent = 'Нет аккаунта? Зарегистрироваться';
    } else {
        title.textContent = 'Регистрация';
        submitBtn.textContent = 'Зарегистрироваться';
        displayNameField.style.display = 'block';
        document.getElementById('authSwitch').textContent = 'Уже есть аккаунт? Войти';
    }
    document.getElementById('authError').textContent = '';
};

document.getElementById('authSubmitBtn').onclick = async () => {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    const displayName = document.getElementById('authDisplayName').value.trim();
    
    if (!username || !password) {
        document.getElementById('authError').textContent = 'Заполните все поля';
        return;
    }
    
    const endpoint = isLoginMode ? '/api/login' : '/api/register';
    const body = isLoginMode ? { username, password } : { username, password, displayName };
    
    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        
        if (data.error) {
            document.getElementById('authError').textContent = data.error;
        } else {
            currentUser = data.user;
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('currentUserName').textContent = currentUser.displayName || currentUser.username;
            document.getElementById('currentUserDisplay').textContent = `@${currentUser.username}`;
            
            socket.emit('auth', {
                userId: currentUser.id,
                username: currentUser.username,
                displayName: currentUser.displayName || currentUser.username
            });
        }
    } catch (err) {
        document.getElementById('authError').textContent = 'Ошибка соединения';
    }
};

// ============ SOCKET СОБЫТИЯ ============

socket.on('rooms list', (rooms) => {
    groups = {};
    const container = document.getElementById('groupsList');
    container.innerHTML = '';
    
    rooms.forEach(room => {
        groups[room.id] = room;
        const div = document.createElement('div');
        div.className = `group-item ${room.id === currentRoomId ? 'active' : ''}`;
        div.innerHTML = `
            <div style="flex:1">
                <div class="group-name">${escapeHtml(room.name)}</div>
                <div class="group-members">${room.membersCount} участников</div>
            </div>
            ${room.creatorId === currentUser?.id ? `<button class="delete-group" onclick="deleteGroup('${room.id}', event)">🗑️</button>` : ''}
        `;
        div.onclick = (e) => {
            if (e.target.classList.contains('delete-group')) return;
            switchRoom(room.id);
        };
        container.appendChild(div);
    });
    
    if (rooms.length === 0) {
        container.innerHTML = '<div style="color:#8e9eae; padding:10px;">Нет групп. Создайте первую!</div>';
    }
});

socket.on('group created', (room) => {
    // Обновляем список
    socket.emit('join room', { roomId: room.id, userId: currentUser.id });
    currentRoomId = room.id;
    document.getElementById('messageInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('currentRoomName').textContent = room.name;
});

socket.on('group deleted', (roomId) => {
    if (currentRoomId === roomId) {
        currentRoomId = null;
        document.getElementById('messagesContainer').innerHTML = '<div style="color:#8e9eae; text-align:center; padding:20px;">Группа удалена</div>';
        document.getElementById('messageInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('currentRoomName').textContent = 'Выберите группу';
    }
});

socket.on('chat history', (messages) => {
    const container = document.getElementById('messagesContainer');
    container.innerHTML = '';
    messages.forEach(msg => addMessage(msg.username, msg.text, msg.userId === currentUser?.id, msg.time));
    container.scrollTop = container.scrollHeight;
});

socket.on('new message', (msg) => {
    addMessage(msg.username, msg.text, msg.userId === currentUser?.id, msg.time);
});

socket.on('system message', (data) => {
    addSystemMessage(data.text);
});

socket.on('online users', (users) => {
    const container = document.getElementById('onlineList');
    container.innerHTML = '';
    users.forEach(user => {
        const li = document.createElement('li');
        li.textContent = user.displayName || user.username;
        container.appendChild(li);
    });
});

socket.on('error', (msg) => {
    alert(msg);
});

function switchRoom(roomId) {
    if (roomId === currentRoomId) return;
    currentRoomId = roomId;
    socket.emit('join room', { roomId, userId: currentUser.id });
    document.getElementById('currentRoomName').textContent = groups[roomId]?.name || 'Чат';
    document.getElementById('messageInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    
    document.querySelectorAll('.group-item').forEach(item => {
        item.classList.remove('active');
        if (item.querySelector('.group-name')?.textContent === groups[roomId]?.name) {
            item.classList.add('active');
        }
    });
}

function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || !currentRoomId) return;
    
    socket.emit('send message', {
        roomId: currentRoomId,
        text: text,
        userId: currentUser.id,
        username: currentUser.displayName || currentUser.username
    });
    input.value = '';
}

function addMessage(username, text, isSelf, time) {
    const container = document.getElementById('messagesContainer');
    if (container.querySelector('.no-chat')) container.innerHTML = '';
    
    const div = document.createElement('div');
    div.className = `message ${isSelf ? 'self' : 'other'}`;
    div.innerHTML = `
        <div class="message-header">
            <span>${escapeHtml(username)}</span>
            <span>${time || new Date().toLocaleTimeString()}</span>
        </div>
        <div>${escapeHtml(text)}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function addSystemMessage(text) {
    const container = document.getElementById('messagesContainer');
    if (container.querySelector('.no-chat')) container.innerHTML = '';
    
    const div = document.createElement('div');
    div.className = 'message system';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showCreateGroupModal() {
    const name = prompt('Название группы:');
    if (name && name.trim()) {
        socket.emit('create group', { name: name.trim(), userId: currentUser.id, username: currentUser.displayName || currentUser.username });
    }
}

function deleteGroup(roomId, event) {
    event.stopPropagation();
    if (confirm('Удалить эту группу? Все сообщения будут потеряны.')) {
        socket.emit('delete group', { roomId, userId: currentUser.id });
    }
}

document.getElementById('messageInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
});

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
</script>
</body>
</html>
