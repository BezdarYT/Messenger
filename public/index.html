<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мессенджер | Чаты и история</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0e1621;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.app {
    width: 95%;
    max-width: 1400px;
    height: 90vh;
    background: #17212b;
    border-radius: 12px;
    display: flex;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* Левая панель - чаты */
.chats-panel {
    width: 280px;
    background: #1f2a36;
    border-right: 1px solid #2b3b4a;
    display: flex;
    flex-direction: column;
}

.user-info {
    padding: 20px;
    background: #2b3b4a;
    border-bottom: 1px solid #3e5a6c;
}

.user-info h3 {
    color: #fff;
    font-size: 16px;
}

.user-info p {
    color: #8e9eae;
    font-size: 12px;
    margin-top: 5px;
}

.rooms-section {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.rooms-section h4 {
    color: #8e9eae;
    font-size: 12px;
    text-transform: uppercase;
    margin-bottom: 12px;
}

.room-item {
    padding: 10px 12px;
    margin-bottom: 5px;
    background: #2b3b4a;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.room-item:hover {
    background: #3e5a6c;
}

.room-item.active {
    background: #2b5278;
    border-left: 3px solid #65b9f2;
}

.room-name {
    color: #fff;
    font-size: 14px;
}

.room-members {
    color: #8e9eae;
    font-size: 11px;
}

.create-room {
    margin: 10px;
    padding: 10px;
    background: #2b5278;
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
}

.create-room:hover {
    background: #3e6a8c;
}

/* Центральная панель - чат */
.chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 15px 20px;
    background: #1f2a36;
    border-bottom: 1px solid #2b3b4a;
}

.chat-header h2 {
    color: #fff;
    font-size: 18px;
}

.messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.message {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 14px;
    word-wrap: break-word;
}

.message.self {
    background: #2b5278;
    color: #fff;
    align-self: flex-end;
}

.message.other {
    background: #1f2a36;
    color: #fff;
    align-self: flex-start;
}

.message.system {
    background: #2b3b4a;
    color: #8e9eae;
    align-self: center;
    font-size: 12px;
    font-style: italic;
    max-width: 90%;
}

.message-header {
    font-size: 11px;
    color: #8e9eae;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
}

.input-area {
    padding: 15px 20px;
    background: #1f2a36;
    border-top: 1px solid #2b3b4a;
    display: flex;
    gap: 10px;
}

.input-area input {
    flex: 1;
    padding: 12px;
    background: #2b3b4a;
    border: none;
    border-radius: 20px;
    color: #fff;
    font-size: 14px;
    outline: none;
}

.input-area button {
    padding: 12px 24px;
    background: #2b5278;
    border: none;
    border-radius: 20px;
    color: #fff;
    cursor: pointer;
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background: #17212b;
    padding: 30px;
    border-radius: 16px;
    width: 320px;
    text-align: center;
}

.modal-content input {
    width: 100%;
    padding: 12px;
    margin: 15px 0;
    background: #1f2a36;
    border: 1px solid #2b3b4a;
    border-radius: 8px;
    color: #fff;
}

.modal-content button {
    width: 100%;
    padding: 12px;
    background: #2b5278;
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>
</head>
<body>
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>💬 Вход в мессенджер</h2>
        <input type="text" id="usernameInput" placeholder="Ваше имя">
        <button onclick="joinChat()">Войти</button>
    </div>
</div>

<div id="app" class="app hidden">
    <div class="chats-panel">
        <div class="user-info">
            <h3 id="currentUserName"></h3>
            <p>Вы в сети</p>
        </div>
        <div class="rooms-section">
            <h4>📁 ЧАТЫ</h4>
            <div id="roomsList"></div>
            <button class="create-room" onclick="showCreateRoomModal()">+ Создать чат</button>
        </div>
    </div>
    
    <div class="chat-panel">
        <div class="chat-header">
            <h2 id="currentRoomName">Загрузка...</h2>
        </div>
        <div id="messagesContainer" class="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Напишите сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentUser = null;
let currentRoomId = 'general';
let roomsList = {};

function joinChat() {
    const username = document.getElementById('usernameInput').value.trim();
    if (!username) return alert('Введите имя');
    
    currentUser = username;
    socket.emit('user join', { username, roomId: 'general' });
    
    document.getElementById('loginModal').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('currentUserName').textContent = username;
}

socket.on('chat history', (messages) => {
    const container = document.getElementById('messagesContainer');
    container.innerHTML = '';
    messages.forEach(msg => addMessage(msg.user, msg.text, msg.user === currentUser, msg.time));
});

socket.on('chat message', (msg) => {
    if (msg.user !== currentUser) {
        addMessage(msg.user, msg.text, false, msg.time);
    }
});

socket.on('system message', (data) => {
    addSystemMessage(data.text);
});

socket.on('room list', (rooms) => {
    roomsList = {};
    const container = document.getElementById('roomsList');
    container.innerHTML = '';
    
    rooms.forEach(room => {
        roomsList[room.id] = room.name;
        const div = document.createElement('div');
        div.className = `room-item ${room.id === currentRoomId ? 'active' : ''}`;
        div.innerHTML = `
            <span class="room-name">${escapeHtml(room.name)}</span>
            <span class="room-members">${room.members}</span>
        `;
        div.onclick = () => switchRoom(room.id);
        container.appendChild(div);
    });
});

socket.on('room created', (data) => {
    switchRoom(data.roomId);
});

function switchRoom(roomId) {
    if (roomId === currentRoomId) return;
    currentRoomId = roomId;
    socket.emit('switch room', roomId);
    document.getElementById('currentRoomName').textContent = roomsList[roomId] || 'Чат';
    document.getElementById('messagesContainer').innerHTML = '';
}

function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    
    socket.emit('chat message', { text });
    addMessage(currentUser, text, true, new Date().toLocaleTimeString());
    input.value = '';
}

function addMessage(user, text, isSelf, time) {
    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.className = `message ${isSelf ? 'self' : 'other'}`;
    div.innerHTML = `
        <div class="message-header">
            <span>${escapeHtml(user)}</span>
            <span>${time}</span>
        </div>
        <div>${escapeHtml(text)}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function addSystemMessage(text) {
    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.className = 'message system';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showCreateRoomModal() {
    const name = prompt('Название чата:');
    if (name && name.trim()) {
        socket.emit('create room', name.trim());
    }
}

document.getElementById('messageInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
});

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
</script>
</body>
</html>
